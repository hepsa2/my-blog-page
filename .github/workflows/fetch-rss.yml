name: 更新 Meteor 博客

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write   # 👈 关键

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 仓库
      uses: actions/checkout@v3

    - name: 设置 Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 安装依赖并抓取 RSS
      run: |
        npm install axios xml2js
        node <<EOF
        const fs = require('fs');
        const axios = require('axios');
        const xml2js = require('xml2js');

        (async () => {
          const url = 'https://paper.wf/meteor/feed/';
          const res = await axios.get(url);
          const parser = new xml2js.Parser();
          const result = await parser.parseStringPromise(res.data);

          const items = (result.rss.channel[0].item || [])
            .slice(0, 5)   // 👈 只保留最新5篇
            .map(it => ({
              title: it.title[0],
              link: it.link[0],
              content: it.description ? it.description[0] : ''
            }));

          fs.writeFileSync('blog.json', JSON.stringify(items, null, 2));
        })();
        EOF

    - name: 提交 blog.json
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add blog.json
        git commit -m "自动更新 blog.json" || echo "没有变化"
        git push
